name: vacunacion_app
description: "Aplicación de gestión de campañas de vacunación municipal"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Backend ──────────────────────────────────────────────
  supabase_flutter: ^2.8.4          # Auth + Database + Storage

  # ── Cámara y multimedia ──────────────────────────────────
  image_picker: ^1.1.2              # Seleccionar foto o tomar con cámara
  cached_network_image: ^3.4.1      # Mostrar imágenes desde Supabase Storage

  # ── GPS / Ubicación ──────────────────────────────────────
  geolocator: ^13.0.2               # Obtener latitud y longitud
  permission_handler: ^11.3.1       # Permisos de cámara, ubicación, etc.

  # ── Offline / Persistencia local ─────────────────────────
  hive_flutter: ^1.1.0              # Base de datos local key-value (offline)
  hive: ^2.2.3
  connectivity_plus: ^6.1.0         # Detectar si hay conexión a internet

  # ── Estado y navegación ──────────────────────────────────
  provider: ^6.1.2                  # Manejo de estado global (roles, sesión)
  go_router: ^14.6.2                # Navegación con rutas nombradas por rol

  # ── UI / Componentes visuales ────────────────────────────
  flutter_spinkit: ^5.2.1           # Indicadores de carga animados
  fluttertoast: ^8.2.12             # Mensajes toast de éxito/error
  fl_chart: ^0.70.2                 # Gráficas para el dashboard
  intl: ^0.19.0                     # Formateo de fechas y horas
  uuid: ^4.5.1                      # Generar IDs únicos para registros offline

  # ── Íconos ───────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1            # Generador de adaptadores Hive
  build_runner: ^2.4.13             # Necesario para hive_generator

flutter:
  uses-material-design: true

  # Agrega tus assets aquí cuando los tengas:
  # assets:
  #   - assets/images/
  #   - assets/icons/